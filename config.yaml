app:
  name: "RAG-PDF"
  host: "127.0.0.1"
  port: 8000
  log_level: "info"

embedding:
  text_model: "nomic-ai/nomic-embed-text-v1.5"
  vision_model: "nomic-ai/nomic-embed-vision-v1.5"
  batch_size: 64
  matryoshka_dim: 512
  chunk_size: 1000          # tokens (was 500 chars)
  vector_size: 512
  overlap: 200              # tokens (was 50 chars)

vectorstore:
  type: qdrant
  collection: rag_chunks
  path: "./qdrant_local"
  ann_index: hnsw
  parallel_upserts: true
  vector_size: 512

llm:
  provider: local            # "local" or "groq"
  local:
    base_url: "http://localhost:8080/v1"
    model: "llama-3.1-8b"
  groq:
    base_url: "https://api.groq.com/openai/v1"
    model: "llama-3.3-70b-versatile"
    api_key: null            # Set via GROQ_API_KEY env var
  temperature: 0.2
  max_tokens: 800

coref:
  enabled: true              # Lightweight pronoun detection (no model loaded)

intent:
  enabled: true
  default_intent: "qa"
  confidence_threshold: 0.6

ingestion:
  image_format: "jpg"
  image_dpi: 300
  max_chunk_size: 1200       # tokens
  min_chunk_size: 100        # tokens
  chunk_overlap: 200         # tokens

retrieval:
  top_k: 5
  similarity_threshold: 0.5
  max_history_turns: 10
  summary_after: 8
  max_context_chars: 12000
  use_bm25: true
  use_reranker: true
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"

server:
  host: "0.0.0.0"
  port: 8000
  reload: true

streamlit:
  port: 8501
